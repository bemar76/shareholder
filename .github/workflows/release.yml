name: Release

on:
  push:
    branches:
      - 'release/*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Version aus Branch-Name extrahieren
        id: ver
        shell: pwsh
        run: |
          # Branch: release/1.2.3  →  VERSION=1.2.3
          $branch = "${{ github.ref_name }}"
          $v = $branch -replace '^release/', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: CMake Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DSHAREHOLDER_VERSION="${{ steps.ver.outputs.VERSION }}"

      - name: CMake Build
        run: cmake --build build --config Release

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "Shareholder v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## Shareholder v${{ steps.ver.outputs.VERSION }}

            **NAS Drive Mapper** – Verbindet NAS-Freigaben als Windows-Netzlaufwerke.

            ### Installation
            1. `shareholder.exe` herunterladen und in ein beliebiges Verzeichnis kopieren
            2. Ersteinrichtung: `shareholder.exe --setup`
            3. Laufwerke verbinden: `shareholder.exe`

            ### Weitere Befehle
            | Befehl | Beschreibung |
            |---|---|
            | `shareholder.exe --unmap` | Alle Laufwerke trennen |
            | `shareholder.exe --forget` | Gespeichertes Passwort löschen |
            | `shareholder.exe --help` | Hilfe anzeigen |

            ---
            © 2026 Benjamin Mark
          files: build/Release/shareholder.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}